<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PLSP – Log In</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:  #1a6b2a;
      --green-main:  #2e8b3f;
      --green-btn:   #3aaa4f;
      --green-hover: #2d9444;
      --green-light: #e8f5eb;
      --blue-border: #3b82f6;
      --text-dark:   #1e293b;
      --text-muted:  #64748b;
      --white:       #ffffff;
      --card-bg:     rgba(255,255,255,0.88);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
    }

    /* ── LAYOUT ── */
    .page {
      display: flex;
      min-height: 100vh;
    }

    /* ── LEFT PANEL ── */
    .left {
      flex: 0 0 42%;
      background: var(--green-main);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 3rem 2.5rem;
      position: relative;
      overflow: hidden;
    }

    /* decorative blob */
    .left::before {
      content: '';
      position: absolute;
      top: -80px; left: -80px;
      width: 320px; height: 320px;
      background: rgba(255,255,255,0.07);
      border-radius: 50%;
    }
    .left::after {
      content: '';
      position: absolute;
      bottom: -60px; right: -60px;
      width: 260px; height: 260px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
    }

    .welcome-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      color: var(--white);
      text-align: center;
      line-height: 1.45;
      margin-bottom: 2.5rem;
      position: relative;
      z-index: 1;
    }

    /* school seal */
    .seal-wrapper {
      position: relative;
      z-index: 1;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
      overflow: hidden;
      animation: floatSeal 4s ease-in-out infinite;
    }

    /* SVG placeholder seal (matches the uploaded image's circular badge) */
    .seal-wrapper svg {
      width: 160px;
      height: 160px;
    }

    @keyframes floatSeal {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    /* ── RIGHT PANEL ── */
    .right {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* school-building photo background via CSS gradient stand-in */
    .bg-photo {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg,
          rgba(180,200,180,0.55) 0%,
          rgba(140,170,150,0.45) 100%),
        repeating-linear-gradient(
          45deg,
          rgba(255,255,255,0.04) 0px,
          rgba(255,255,255,0.04) 2px,
          transparent 2px,
          transparent 12px
        );
      background-color: #b0c4b8;
    }

    /* ── CARD ── */
    .card {
      position: relative;
      z-index: 2;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 2px solid var(--blue-border);
      border-radius: 20px;
      padding: 2.5rem 2rem 2rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      animation: slideUp 0.55s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--text-dark);
      text-align: center;
      margin-bottom: 1.6rem;
    }

    /* ── FORM ── */
    .field + .field { margin-top: 1rem; }

    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 5px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap .icon {
      position: absolute;
      left: 12px;
      color: #94a3b8;
      font-size: 1rem;
      pointer-events: none;
    }

    .input-wrap input {
      width: 100%;
      padding: 0.65rem 2.5rem 0.65rem 2.4rem;
      border: 1.5px solid #cbd5e1;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      color: var(--text-dark);
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap input::placeholder { color: #b0bec5; }

    .input-wrap input:focus {
      border-color: var(--blue-border);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    /* eye toggle */
    .eye-btn {
      position: absolute;
      right: 10px;
      background: none;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      font-size: 1rem;
      padding: 2px;
      transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--text-muted); }

    /* forgot */
    .forgot-row {
      text-align: right;
      margin-top: 0.45rem;
    }
    .forgot-row a {
      font-size: 0.8rem;
      color: var(--green-main);
      text-decoration: none;
      font-weight: 500;
    }
    .forgot-row a:hover { text-decoration: underline; }

    /* login button */
    .btn-login {
      display: block;
      width: 100%;
      margin-top: 1.4rem;
      padding: 0.78rem;
      background: var(--green-btn);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(46,139,63,0.35);
    }
    .btn-login:hover {
      background: var(--green-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(46,139,63,0.45);
    }
    .btn-login:active { transform: translateY(0); }

    /* register row */
    .register-row {
      text-align: center;
      margin-top: 1.1rem;
      font-size: 0.83rem;
      color: var(--text-muted);
    }
    .register-row a {
      color: var(--green-main);
      font-weight: 600;
      text-decoration: none;
    }
    .register-row a:hover { text-decoration: underline; }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .page { flex-direction: column; }
      .left {
        flex: none;
        padding: 2.5rem 1.5rem 2rem;
        border-radius: 0 0 40px 40px;
      }
      .welcome-text { font-size: 1.4rem; }
      .seal-wrapper { width: 130px; height: 130px; }
      .seal-wrapper svg { width: 115px; height: 115px; }
      .right { padding: 2.5rem 1rem; }
      .card { max-width: 100%; }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- ═══ LEFT PANEL ═══ -->
  <aside class="left">
    <p class="welcome-text">Welcome to our beloved school!<br>Your journey starts here.</p>

    <div class="seal-wrapper">
      <!-- SVG representation of the PLSP circular seal -->
      <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
        <!-- outer ring -->
        <circle cx="80" cy="80" r="78" fill="#1a6b2a"/>
        <circle cx="80" cy="80" r="72" fill="none" stroke="#fff" stroke-width="1.5"/>
        <circle cx="80" cy="80" r="62" fill="#fff"/>
        <!-- inner content area -->
        <circle cx="80" cy="80" r="60" fill="#f0f9f1"/>

        <!-- book -->
        <rect x="52" y="72" width="56" height="34" rx="3" fill="#2e7d32"/>
        <rect x="52" y="72" width="28" height="34" rx="3" fill="#388e3c"/>
        <line x1="80" y1="72" x2="80" y2="106" stroke="#fff" stroke-width="1.5"/>

        <!-- torch flame -->
        <ellipse cx="80" cy="56" rx="5" ry="8" fill="#f9a825" opacity="0.9"/>
        <ellipse cx="80" cy="60" rx="3" ry="5" fill="#ffca28"/>
        <!-- torch handle -->
        <rect x="78" y="62" width="4" height="12" rx="2" fill="#795548"/>

        <!-- palm trees (simple) -->
        <line x1="60" y1="95" x2="60" y2="75" stroke="#33691e" stroke-width="2"/>
        <ellipse cx="60" cy="74" rx="7" ry="4" fill="#558b2f" transform="rotate(-15 60 74)"/>
        <ellipse cx="60" cy="74" rx="7" ry="4" fill="#558b2f" transform="rotate(20 60 74)"/>

        <line x1="100" y1="95" x2="100" y2="75" stroke="#33691e" stroke-width="2"/>
        <ellipse cx="100" cy="74" rx="7" ry="4" fill="#558b2f" transform="rotate(15 100 74)"/>
        <ellipse cx="100" cy="74" rx="7" ry="4" fill="#558b2f" transform="rotate(-20 100 74)"/>

        <!-- water waves -->
        <path d="M52 100 Q60 97 68 100 Q76 103 84 100 Q92 97 100 100 Q108 103 108 103"
              fill="none" stroke="#1565c0" stroke-width="1.5" opacity="0.6"/>

        <!-- shield/crest emblem -->
        <path d="M74 82 L80 78 L86 82 L86 90 Q80 94 74 90 Z" fill="#1565c0" opacity="0.85"/>
        <text x="80" y="89" text-anchor="middle" font-size="5.5" fill="#fff" font-weight="bold" font-family="sans-serif">DLSP</text>

        <!-- circular text (top arc) -->
        <path id="topArc" d="M 22,80 A 58,58 0 0,1 138,80" fill="none"/>
        <text font-size="6.8" fill="#1a6b2a" font-family="sans-serif" font-weight="bold" letter-spacing="1.8">
          <textPath href="#topArc" startOffset="5%">PAMANTASAN NG LUNGSOD NG SAN PABLO</textPath>
        </text>

        <!-- circular text (bottom arc) -->
        <path id="botArc" d="M 30,105 A 58,58 0 0,0 130,105" fill="none"/>
        <text font-size="7" fill="#1a6b2a" font-family="sans-serif" font-weight="bold" letter-spacing="2">
          <textPath href="#botArc" startOffset="18%">FOUNDED 1997</textPath>
        </text>

        <!-- year banner -->
        <rect x="62" y="112" width="36" height="13" rx="3" fill="#1a6b2a"/>
        <text x="80" y="122" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold" font-family="sans-serif">2021</text>

        <!-- dot accents -->
        <circle cx="28" cy="112" r="3" fill="#1a6b2a"/>
        <circle cx="132" cy="112" r="3" fill="#1a6b2a"/>
      </svg>
    </div>
  </aside>

  <!-- ═══ RIGHT PANEL ═══ -->
  <main class="right">
    <div class="bg-photo"></div>

    <div class="card">
      <h1>Log in</h1>

      <!-- Email / Student No. -->
      <div class="field">
        <label for="email">Email / Student No.</label>
        <div class="input-wrap">
          <span class="icon">✉</span>
          <input id="email" type="text" placeholder="Enter Email or Student Id" autocomplete="username"/>
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="icon" style="display:flex;align-items:center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input id="password" type="password" placeholder="Enter Your Password" autocomplete="current-password"/>
          <button class="eye-btn" type="button" id="togglePwd" aria-label="Show/hide password">👁</button>
        </div>
      </div>

      <div class="forgot-row">
        <a href="#">Forgot Password?</a>
      </div>

      <button class="btn-login" type="button">LOGIN</button>

      <p class="register-row">
        Don't have account? <a href="#">Register</a>
      </p>
    </div>
  </main>

</div>

<script>
  // Toggle password visibility
  const toggleBtn = document.getElementById('togglePwd');
  const pwdInput  = document.getElementById('password');
  toggleBtn.addEventListener('click', () => {
    const show = pwdInput.type === 'password';
    pwdInput.type = show ? 'text' : 'password';
    toggleBtn.textContent = show ? '🙈' : '👁';
  });
</script>

</body>
</html>
